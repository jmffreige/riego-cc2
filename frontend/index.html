<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1f1b" />
    <meta name="description" content="Control de las distintas zonas de casa." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Control-CC2" />

    <title>Control-CC2</title>

    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon-512.png" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./home.js" defer></script>
  </head>

  <body>
    <div class="ambient ambient--one" aria-hidden="true"></div>
    <div class="ambient ambient--two" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="topbar">
        <a class="brand" href="./" aria-label="Inicio de Control-CC2">
          <img class="brand__icon" src="./icon-192.png" alt="" />
          <span><strong>Control-CC2</strong></span>
        </a>
      </header>

      <section class="home-hero" aria-labelledby="page-title">
        <p class="eyebrow">Mi hogar</p>
        <h1 id="page-title">¿Qué zona quieres controlar?</h1>
        <p>Accede a los dispositivos conectados de cada espacio.</p>
      </section>

      <section class="spaces-section" aria-labelledby="spaces-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Espacios</p>
            <h2 id="spaces-title">Zonas de la casa</h2>
          </div>
          <span class="device-count">1 zona</span>
        </div>

        <div class="spaces-grid">
          <a class="space-card" href="./jardin-frontal.html">
            <div class="space-card__visual" aria-hidden="true">
              <span class="space-card__sun"></span>
              <svg viewBox="0 0 320 180">
                <path class="space-card__ground" d="M0 142c45-28 91-30 136-7 45-34 104-35 184 4v41H0Z" />
                <path class="space-card__plant" d="M158 145V88m0 31c-29-3-43-18-44-44 27 2 42 17 44 44Zm0-15c27-3 42-18 44-44-27 2-42 17-44 44Z" />
                <path class="space-card__water" d="M75 112c14-22 37-32 68-30M245 112c-14-22-37-32-68-30" />
              </svg>
            </div>

            <div class="space-card__content">
              <div>
                <small>Exterior</small>
                <h3>Jardín Frontal</h3>
                <p>4 zonas de riego</p>
              </div>
              <span class="space-card__arrow" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6" /></svg>
              </span>
            </div>
          </a>
        </div>
      </section>

      <p class="footer-note">Control-CC2 · Hogar conectado</p>
    </main>
  </body>
</html>
