<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riego CC2 OTA Publisher</title>
    <script src="https://unpkg.com/mqtt@5.15.1/dist/mqtt.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1f1a;
        color: #eef7f2;
      }

      body {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 18px;
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        color: #a9bbb2;
      }

      form,
      pre {
        border: 1px solid #29473d;
        border-radius: 8px;
        background: #132821;
      }

      form {
        display: grid;
        gap: 16px;
        padding: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #b8cbc2;
        font-size: 0.9rem;
      }

      input,
      textarea,
      button {
        min-height: 42px;
        border: 1px solid #365c50;
        border-radius: 6px;
        background: #091711;
        color: #f3fbf7;
        font: inherit;
      }

      input,
      textarea {
        padding: 0 12px;
      }

      textarea {
        min-height: 120px;
        padding-block: 12px;
      }

      button {
        cursor: pointer;
        padding: 0 16px;
        background: #65e49b;
        color: #092015;
        font-weight: 800;
      }

      button.secondary {
        background: transparent;
        color: #65e49b;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      pre {
        min-height: 90px;
        padding: 14px;
        overflow: auto;
        white-space: pre-wrap;
      }

      @media (max-width: 680px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Riego CC2 OTA Publisher</h1>
    <p>Publica la orden OTA con retain para que el ESP32 la lea cuando despierte.</p>

    <form id="ota-form">
      <div class="grid">
        <label>
          Host HiveMQ
          <input id="host" value="36259d97745649d69b665673ad1883e7.s1.eu.hivemq.cloud" required />
        </label>
        <label>
          Puerto WSS
          <input id="port" type="number" value="8884" required />
        </label>
        <label>
          Usuario
          <input id="username" value="admin_cc2" required />
        </label>
        <label>
          Password
          <input id="password" type="password" required />
        </label>
      </div>

      <label>
        Topic
        <input id="topic" value="riego/device/ota/cmd" required />
      </label>

      <label>
        Payload
        <textarea id="payload" spellcheck="false">{
  "enabled": true,
  "version": "2026.07.06-ota2",
  "url": "https://github.com/jmffreige/riego-cc2/releases/download/2026.07.06-ota2/firmware.bin",
  "sha256": "HASH_SHA256_DEL_BINARIO"
}</textarea>
      </label>

      <div class="actions">
        <button id="connect-button" type="button">Conectar MQTT</button>
        <button class="secondary" id="disconnect-button" type="button" disabled>Desconectar</button>
        <button id="publish-button" type="submit" disabled>Publicar OTA retenida</button>
        <button class="secondary" id="clear-command" type="button">Desarmar OTA retenida</button>
      </div>
    </form>

    <h2>Estado</h2>
    <pre id="log">Sin conectar.</pre>

    <script>
      const form = document.querySelector("#ota-form");
      const log = document.querySelector("#log");
      const connectButton = document.querySelector("#connect-button");
      const disconnectButton = document.querySelector("#disconnect-button");
      const publishButton = document.querySelector("#publish-button");
      const clearButton = document.querySelector("#clear-command");
      let client = null;

      function write(message) {
        log.textContent = `${new Date().toLocaleTimeString()} - ${message}\n${log.textContent}`;
      }

      function setConnected(connected) {
        connectButton.disabled = connected;
        disconnectButton.disabled = !connected;
        publishButton.disabled = !connected;
        clearButton.disabled = !connected;
      }

      function readConfig() {
        return {
          host: document.querySelector("#host").value.trim().replace(/^wss?:\/\//, "").replace(/\/.*$/, ""),
          port: Number(document.querySelector("#port").value),
          username: document.querySelector("#username").value.trim(),
          password: document.querySelector("#password").value,
          topic: document.querySelector("#topic").value.trim(),
        };
      }

      function connectMqtt() {
        const config = readConfig();
        if (client?.connected) {
          write("Ya conectado.");
          return;
        }

        write(`Conectando a wss://${config.host}:${config.port}/mqtt como ${config.username}...`);
        client = mqtt.connect(`wss://${config.host}:${config.port}/mqtt`, {
          username: config.username,
          password: config.password,
          clientId: `riego-ota-${Date.now().toString(36)}`,
          clean: true,
          connectTimeout: 10000,
          reconnectPeriod: 0,
          protocolVersion: 4,
        });

        client.on("connect", () => {
          write("Conectado a MQTT. Puedes publicar la orden OTA.");
          setConnected(true);
          client.subscribe("riego/device/ota/state", { qos: 1 }, (error) => {
            write(error ? `No se pudo suscribir a ota/state: ${error.message}` : "Suscrito a riego/device/ota/state.");
          });
        });

        client.on("message", (topic, message) => {
          write(`${topic}: ${message.toString()}`);
        });

        client.on("close", () => {
          write("Conexion MQTT cerrada.");
          setConnected(false);
        });

        client.on("error", (error) => {
          write(`Error MQTT: ${error.message}`);
          client.end(true);
        });
      }

      function disconnectMqtt() {
        if (!client) return;
        client.end(true);
      }

      function publishRetained(payload) {
        if (!client?.connected) {
          write("Primero conecta a MQTT.");
          return;
        }

        const config = readConfig();
        client.publish(config.topic, payload, { qos: 1, retain: true }, (error) => {
          if (error) {
            write(`Error publicando: ${error.message}`);
            return;
          }
          write(`Publicado con retain=true en ${config.topic}: ${payload}`);
        });
      }

      connectButton.addEventListener("click", connectMqtt);
      disconnectButton.addEventListener("click", disconnectMqtt);

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        try {
          JSON.parse(document.querySelector("#payload").value);
        } catch {
          write("El payload no es JSON valido.");
          return;
        }
        publishRetained(document.querySelector("#payload").value);
      });

      clearButton.addEventListener("click", () => {
        publishRetained('{"enabled": false}');
      });

      setConnected(false);
    </script>
  </body>
</html>
